<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda Location</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#F7F4EF; --surface:#FFFFFF; --border:#E8E2D9;
    --text:#1A1714; --muted:#8C8278; --accent:#C4873A;
    --airbnb:#FF385C; --booking:#003580; --direct:#E6A817;
    --green:#2D6A4F;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);min-height:100vh}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px;position:sticky;top:0;z-index:100}
  .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  header h1{font-family:'DM Serif Display',serif;font-size:1.3rem;letter-spacing:-0.02em}
  .view-toggle{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--bg)}
  .view-btn{padding:6px 14px;border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:0.78rem;font-weight:500;cursor:pointer;color:var(--muted);transition:all 0.15s}
  .view-btn.active{background:var(--text);color:white}
  .year-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px}
  .year-tab{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);font-size:0.78rem;font-weight:500;cursor:pointer;color:var(--muted);font-family:'DM Sans',sans-serif;white-space:nowrap;transition:all 0.15s}
  .year-tab.active{background:var(--text);color:white;border-color:var(--text)}
  .container{max-width:720px;margin:0 auto;padding:20px 16px 80px}
  .legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
  .legend-item{display:flex;align-items:center;gap:5px;font-size:0.72rem;color:var(--muted)}
  .legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  /* Calendar */
  .cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .cal-nav h2{font-family:'DM Serif Display',serif;font-size:1.1rem}
  .nav-btn{background:none;border:1px solid var(--border);border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:1rem;color:var(--text)}
  .cal-grid{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
  .cal-days-header{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border)}
  .cal-day-name{text-align:center;padding:8px 2px;font-size:0.65rem;font-weight:500;text-transform:uppercase;color:var(--muted)}
  .cal-cells{display:grid;grid-template-columns:repeat(7,1fr)}
  .cal-cell{min-height:52px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:3px;position:relative}
  .cal-cell:nth-child(7n){border-right:none}
  .cal-cell.empty{background:var(--bg)}
  .cal-cell.today{background:#FEF9F0}
  .cal-cell.has-stay{cursor:pointer}
  .cal-num{font-size:0.68rem;font-weight:500;color:var(--muted);margin-bottom:1px}
  .cal-cell.today .cal-num{color:var(--accent);font-weight:700}
  .stay-bar{border-radius:3px;padding:1px 3px;font-size:0.58rem;font-weight:500;color:white;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;margin-bottom:1px;line-height:1.4}
  .stay-airbnb{background:var(--airbnb)}
  .stay-booking{background:var(--booking)}
  .stay-direct{background:var(--direct)}
  .tooltip{position:fixed;background:var(--text);color:white;padding:10px 14px;border-radius:10px;font-size:0.78rem;z-index:500;pointer-events:none;max-width:200px;line-height:1.5;box-shadow:0 4px 16px rgba(0,0,0,0.2);display:none}
  /* List */
  .filter-bar{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:2px}
  .filter-btn{padding:5px 13px;border-radius:20px;border:1px solid var(--border);background:var(--surface);font-size:0.75rem;font-weight:500;cursor:pointer;color:var(--muted);font-family:'DM Sans',sans-serif;white-space:nowrap;transition:all 0.15s}
  .filter-btn.active{background:var(--accent);color:white;border-color:var(--accent)}
  .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .section-header h2{font-family:'DM Serif Display',serif;font-size:1.05rem}
  .count-label{font-size:0.75rem;color:var(--muted)}
  .reservations-list{display:flex;flex-direction:column;gap:10px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;display:flex;gap:14px;align-items:flex-start;transition:box-shadow 0.15s;border-left:4px solid var(--border)}
  .card:hover{box-shadow:0 3px 14px rgba(0,0,0,0.06)}
  .card.past{opacity:0.42}
  .card.platform-airbnb{border-left-color:var(--airbnb)}
  .card.platform-booking{border-left-color:var(--booking)}
  .card.platform-direct{border-left-color:var(--direct)}
  .card-left{min-width:46px;text-align:center;flex-shrink:0}
  .date-day{font-family:'DM Serif Display',serif;font-size:1.5rem;line-height:1}
  .date-month{font-size:0.62rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);font-weight:500}
  .date-sep{font-size:0.7rem;color:var(--border);margin:3px 0}
  .card-body{flex:1;min-width:0}
  .card-name{font-weight:500;font-size:0.95rem;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card-meta{display:flex;flex-wrap:wrap;gap:5px}
  .tag{font-size:0.7rem;padding:3px 8px;border-radius:20px;font-weight:500;display:inline-flex;align-items:center;gap:3px}
  .tag-platform{color:white}
  .tag-airbnb{background:var(--airbnb)}
  .tag-booking{background:var(--booking)}
  .tag-direct{background:var(--direct)}
  .tag-nights{background:#F0EDE8;color:var(--muted)}
  .tag-beds{background:#E8F4F0;color:var(--green)}
  .tag-persons{background:#EEF0F8;color:#5C6BC0}
  .tag-dog{background:#FDF0E6;color:#E07A3A}
  .tag-cat{background:#F5EEF8;color:#9B59B6}
  .tag-menage{background:#FEF3E2;color:var(--accent)}
  .month-sep{font-size:0.7rem;font-weight:500;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);padding:10px 4px 2px}
  .empty-state{text-align:center;padding:52px 24px;color:var(--muted)}
  .empty-state .icon{font-size:2.8rem;margin-bottom:12px}
  .empty-state p{font-size:0.88rem;line-height:1.6}
  @media(max-width:600px){
    header h1{font-size:1.1rem}
    .cal-cell{min-height:44px;padding:2px}
    .cal-num{font-size:0.65rem}
    .stay-bar{font-size:0.55rem;padding:1px 2px}
    .cal-day-name{font-size:0.6rem;padding:6px 2px}
  }
</style>
</head>
<body>
<header>
  <div class="header-top">
    <h1>🏠 Agenda Location</h1>
    <div class="view-toggle">
      <button class="view-btn" id="btn-cal" onclick="setView('calendar')">📅 Calendrier</button>
      <button class="view-btn active" id="btn-list" onclick="setView('list')">☰ Liste</button>
    </div>
  </div>
  <div class="year-tabs" id="year-tabs"></div>
</header>
<div class="container">
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--airbnb)"></div>Airbnb</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--booking)"></div>Booking</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--direct)"></div>Direct</div>
    <span style="font-size:0.7rem;color:var(--muted);margin-left:auto">Mis à jour le 04/04/2026 à 12:17</span>
  </div>
  <div id="view-calendar" style="display:none">
    <div class="cal-nav">
      <button class="nav-btn" onclick="prevMonth()">‹</button>
      <h2 id="cal-title"></h2>
      <button class="nav-btn" onclick="nextMonth()">›</button>
    </div>
    <div class="cal-grid">
      <div class="cal-days-header">
        <div class="cal-day-name">Lun</div><div class="cal-day-name">Mar</div>
        <div class="cal-day-name">Mer</div><div class="cal-day-name">Jeu</div>
        <div class="cal-day-name">Ven</div><div class="cal-day-name">Sam</div>
        <div class="cal-day-name">Dim</div>
      </div>
      <div class="cal-cells" id="cal-cells"></div>
    </div>
  </div>
  <div id="view-list">
    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('upcoming',this)">À venir</button>
      <button class="filter-btn" onclick="setFilter('all',this)">Tous</button>
      <button class="filter-btn" onclick="setFilter('past',this)">Passés</button>
    </div>
    <div class="section-header">
      <h2>Réservations</h2>
      <span class="count-label" id="count-label"></span>
    </div>
    <div class="reservations-list" id="list"></div>
  </div>
</div>
<div class="tooltip" id="tooltip"></div>

"", "menage": 30.0, "platform": "airbnb"}, {"name": "Laura", "checkin": "2026-08-02", "checkout": "2026-08-08", "nights": 6, "lits": 2, "personnes": 3, "animal": "", "menage": 30.0, "platform": "airbnb"}, {"name": "Estelle", "checkin": "2026-08-08", "checkout": "2026-08-15", "nights": 7, "lits": 2, "personnes": 4, "animal": "", "menage": 30.0, "platform": "airbnb"}, {"name": "Melody", "checkin": "2026-08-15", "checkout": "2026-08-22", "nights": 7, "lits": 2, "personnes": 4, "animal": "", "menage": 30.0, "platform": "airbnb"}]};
  const MONTHS_FR   = ['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'];
  const MONTHS_LONG = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

  let currentYear = '', currentView = 'list', currentFilter = 'upcoming';
  let calYear, calMonth;
  const today = new Date().toISOString().split('T')[0];
  const years = Object.keys(ALL_DATA).sort((a,b)=>b-a);

  for (const y of years) {
    if (ALL_DATA[y] && ALL_DATA[y].some(r => r.checkout >= today)) { currentYear = y; break; }
  }
  if (!currentYear && years.length) currentYear = years[0];
  calYear  = parseInt(currentYear);
  calMonth = new Date().getMonth();

  function renderYearTabs() {
    document.getElementById('year-tabs').innerHTML = years.map(y =>
      `<button class="year-tab ${y===currentYear?'active':''}" onclick="setYear('${y}',this)">${y}</button>`
    ).join('');
  }

  function setYear(y, btn) {
    currentYear = y; calYear = parseInt(y);
    document.querySelectorAll('.year-tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    if (currentView==='calendar') renderCalendar(); else renderList();
  }

  function setView(v) {
    currentView = v;
    document.getElementById('view-calendar').style.display = v==='calendar'?'block':'none';
    document.getElementById('view-list').style.display     = v==='list'?'block':'none';
    document.getElementById('btn-cal').classList.toggle('active',  v==='calendar');
    document.getElementById('btn-list').classList.toggle('active', v==='list');
    if (v==='calendar') renderCalendar(); else renderList();
  }

  function prevMonth() { calMonth--; if (calMonth<0) { calMonth=11; calYear--; } renderCalendar(); }
  function nextMonth() { calMonth++; if (calMonth>11) { calMonth=0; calYear++; } renderCalendar(); }

  function renderCalendar() {
    document.getElementById('cal-title').textContent = MONTHS_LONG[calMonth] + ' ' + calYear;
    const firstDay = new Date(calYear, calMonth, 1);
    const lastDay  = new Date(calYear, calMonth+1, 0);
    let startOffset = firstDay.getDay() - 1;
    if (startOffset < 0) startOffset = 6;
    const allRes = Object.values(ALL_DATA).flat();
    let html = '';
    for (let i=0; i<startOffset; i++) html += `<div class="cal-cell empty"></div>`;
    for (let d=1; d<=lastDay.getDate(); d++) {
      const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isToday = dateStr === today;
      const stays = allRes.filter(r => r.checkin <= dateStr && r.checkout >= dateStr);
      let barsHtml = stays.slice(0,2).map(r => {
        const isArrival   = dateStr === r.checkin;
        const isDeparture = dateStr === r.checkout;
        const badge = isArrival && isDeparture ? ' <span style="background:white;color:#E07A3A;border-radius:3px;padding:0 2px;font-weight:700;font-size:0.6rem">A/D</span>' : isArrival ? ' <span style="background:white;color:#2D6A4F;border-radius:3px;padding:0 2px;font-weight:700;font-size:0.6rem">A</span>' : isDeparture ? ' <span style="background:white;color:#E07A3A;border-radius:3px;padding:0 2px;font-weight:700;font-size:0.6rem">D</span>' : '';
        const label = isArrival ? r.name : '';
        const opacity = isDeparture && !isArrival ? 'opacity:0.5;' : '';
        return `<div class="stay-bar stay-${r.platform}" style="${opacity}">${label}${badge}</div>`;
      }).join('');
      if (stays.length > 2) barsHtml += `<div style="font-size:0.55rem;color:var(--muted)">+${stays.length-2}</div>`;
      const hasStay = stays.length > 0;
      const stayData = hasStay ? `data-stays='${JSON.stringify(stays.map(r=>( {name:r.name,platform:r.platform,checkin:r.checkin,checkout:r.checkout,nights:r.nights,lits:r.lits,personnes:r.personnes,animal:r.animal,menage:r.menage} ))).replace(/'/g,"&#39;")}'` : '';
      html += `<div class="cal-cell${isToday?' today':''}${hasStay?' has-stay':''}" ${stayData} ${hasStay?'onmouseenter="showTooltip(event,this)" onmouseleave="hideTooltip()" ontouchstart="showTooltip(event,this)"':''}>
        <div class="cal-num">${d}</div>${barsHtml}</div>`;
    }
    const total = startOffset + lastDay.getDate();
    const rem = total % 7;
    if (rem > 0) for (let i=0; i<7-rem; i++) html += `<div class="cal-cell empty"></div>`;
    document.getElementById('cal-cells').innerHTML = html;
  }

  function showTooltip(e, cell) {
    const tooltip = document.getElementById('tooltip');
    try {
      const stays = JSON.parse(cell.dataset.stays.replace(/&#39;/g,"'"));
      let content = stays.map(r => {
        const ci = new Date(r.checkin+'T12:00:00');
        const co = new Date(r.checkout+'T12:00:00');
        const pl = r.platform==='airbnb'?'Airbnb':r.platform==='booking'?'Booking':'Direct';
        let lines = `<strong>${r.name}</strong><br>${ci.getDate()} ${MONTHS_FR[ci.getMonth()]} → ${co.getDate()} ${MONTHS_FR[co.getMonth()]}<br>${pl}`;
        if (r.nights)    lines += ` · ${r.nights} nuit${r.nights>1?'s':''}`;
        if (r.personnes) lines += `<br>👤 ${r.personnes} pers.`;
        if (r.animal==='CHIEN') lines += `<br>🐶 Chien`;
        if (r.animal==='CHAT')  lines += `<br>🐱 Chat`;
        if (r.lits)      lines += `<br>🛏 ${r.lits} lit${r.lits>1?'s':''}`;
        if (r.menage)    lines += `<br>🧹 ${Number(r.menage).toLocaleString('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0})}`;
        return lines;
      }).join('<hr style="border:none;border-top:1px solid rgba(255,255,255,0.2);margin:6px 0">');
      tooltip.innerHTML = content;
      tooltip.style.display = 'block';
      const rect = cell.getBoundingClientRect();
      let left = rect.left + window.scrollX;
      let top  = rect.bottom + window.scrollY + 6;
      if (left + 210 > window.innerWidth) left = window.innerWidth - 220;
      tooltip.style.left = left+'px'; tooltip.style.top = top+'px';
    } catch(err) {}
  }
  function hideTooltip() { document.getElementById('tooltip').style.display='none'; }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    renderList();
  }

  function renderList() {
    const list = document.getElementById('list');
    let items = [...(ALL_DATA[currentYear]||[])];
    if (currentFilter==='upcoming') items = items.filter(r=>r.checkout>=today);
    else if (currentFilter==='past') items = items.filter(r=>r.checkout<today);
    items.sort((a,b)=>a.checkin.localeCompare(b.checkin));
    document.getElementById('count-label').textContent = `${items.length} séjour${items.length!==1?'s':''}`;
    if (!items.length) {
      list.innerHTML = `<div class="empty-state"><div class="icon">📅</div><p>Aucun séjour pour ${currentYear}</p></div>`;
      return;
    }
    let html='', lastMonth='';
    for (const r of items) {
      const isPast = r.checkout < today;
      const ci = new Date(r.checkin+'T12:00:00');
      const co = new Date(r.checkout+'T12:00:00');
      const ml = MONTHS_LONG[ci.getMonth()];
      if (ml!==lastMonth) { html+=`<div class="month-sep">${ml}</div>`; lastMonth=ml; }
      const pl = r.platform==='airbnb'?'Airbnb':r.platform==='booking'?'Booking':'Direct';
      const nightsTag    = r.nights    ? `<span class="tag tag-nights">🌙 ${r.nights} nuit${r.nights>1?'s':''}</span>` : '';
      const litsTag      = r.lits      ? `<span class="tag tag-beds">🛏 ${r.lits} lit${r.lits>1?'s':''}</span>` : '';
      const personnesTag = r.personnes ? `<span class="tag tag-persons">👤 ${r.personnes} pers.</span>` : '';
      const animalTag    = r.animal==='CHIEN' ? `<span class="tag tag-dog">🐶 Chien</span>` : r.animal==='CHAT' ? `<span class="tag tag-cat">🐱 Chat</span>` : '';
      const menageTag    = r.menage    ? `<span class="tag tag-menage">🧹 ${Number(r.menage).toLocaleString('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0})}</span>` : '';
      html += `<div class="card platform-${r.platform}${isPast?' past':''}">
        <div class="card-left">
          <div class="date-day">${ci.getDate()}</div>
          <div class="date-month">${MONTHS_FR[ci.getMonth()]}</div>
          <div class="date-sep">↓</div>
          <div class="date-day">${co.getDate()}</div>
          <div class="date-month">${MONTHS_FR[co.getMonth()]}</div>
        </div>
        <div class="card-body">
          <div class="card-name">${r.name}</div>
          <div class="card-meta">
            <span class="tag tag-platform tag-${r.platform}">${pl}</span>
            ${nightsTag}${litsTag}${personnesTag}${animalTag}${menageTag}
          </div>
        </div>
      </div>`;
    }
    list.innerHTML = html;
  }

  renderYearTabs();
  renderList();
</script>
